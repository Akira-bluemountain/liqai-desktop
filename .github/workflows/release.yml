name: Release

# Builds and publishes a macOS arm64 .dmg + checksums.txt to a GitHub
# Release whenever a v* tag is pushed.
#
# Code-signing posture for v0.1.x: ad-hoc only (no Apple Developer ID).
# First-launch users must approve via Right-Click → Open per the User
# Guide. Notarisation will be added in v0.2 when a Developer ID is
# available.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.0-beta-stage1). Leave empty to use the current ref.'
        required: false

permissions:
  contents: write  # required to upload release assets

env:
  NODE_VERSION: '22'

jobs:
  build-macos-arm64:
    name: Build macOS arm64 (.dmg, ad-hoc sign)
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain (Tauri)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install workspace dependencies
        run: npm ci

      - name: Build packages (emit dist/ for cross-package imports)
        run: npm run build

      - name: Typecheck (workspace)
        run: |
          cd packages/ai && npx tsc -p tsconfig.json --noEmit
          cd ../uniswap && npx tsc -p tsconfig.json --noEmit
          cd ../automation && npx tsc -p tsconfig.json --noEmit
          cd ../../apps/desktop && npx tsc -p tsconfig.json --noEmit

      - name: Test (workspace)
        run: |
          cd packages/ai && npx vitest run
          cd ../uniswap && npx vitest run
          cd ../automation && npx vitest run
          cd ../../apps/desktop && npx vitest run

      - name: Lint hooks (react-hooks/exhaustive-deps)
        run: cd apps/desktop && npm run lint:hooks

      - name: Build Tauri bundle (arm64 .dmg)
        run: cd apps/desktop && npm run tauri:build -- --target aarch64-apple-darwin
        env:
          # No notarisation in v0.1.x. Ad-hoc sign during bundle (codesign --sign -)
          # via APPLE_SIGNING_IDENTITY=-. The empty-string variant tried previously
          # failed with "The specified item could not be found in the keychain"
          # because Tauri passes the value verbatim to codesign.
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_SIGNING_IDENTITY: '-'

      - name: Ad-hoc sign LiqAI.app
        run: |
          set -e
          APP_PATH=$(find apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name 'LiqAI.app' -type d | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::LiqAI.app not found under bundle/macos/"
            ls -R apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/ || true
            exit 1
          fi
          echo "Signing $APP_PATH (ad-hoc)"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Locate .dmg + compute SHA-256 checksums
        id: artifacts
        run: |
          set -e
          DMG_PATH=$(find apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "::error::.dmg not found under bundle/dmg/"
            ls -R apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/ || true
            exit 1
          fi
          DMG_NAME=$(basename "$DMG_PATH")
          mkdir -p release-out
          cp "$DMG_PATH" "release-out/$DMG_NAME"
          (cd release-out && shasum -a 256 "$DMG_NAME" > checksums.txt)
          echo "dmg_path=release-out/$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "checksums_path=release-out/checksums.txt" >> "$GITHUB_OUTPUT"
          echo "--- checksums ---"
          cat release-out/checksums.txt

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: liqai-macos-arm64
          path: release-out/*
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-out/*.dmg
            release-out/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: false   # release notes are authored manually per docs/CHANGELOG-security.md cycle
